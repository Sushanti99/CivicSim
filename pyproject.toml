[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # FastAPI Depends() in defaults is fine
]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["E402"]
"backend/tests/*" = ["E402"]
"packages/*/tests/*" = ["E402"]
